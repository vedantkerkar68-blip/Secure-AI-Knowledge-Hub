# ===================================================================
# Secure AI Knowledge Hub (SAKH)
# Spring Boot 3.5.x
# Java 21
# ===================================================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:

  application:
    name: secure-ai-knowledge-hub

  profiles:
    active: dev

  jackson:
    serialization:
      indent-output: true

  datasource:
    url: jdbc:postgresql://localhost:5432/sakh_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver

    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

    hibernate:
      ddl-auto: validate

    show-sql: false

    open-in-view: false

    properties:
      hibernate:
        format_sql: true

        jdbc:
          batch_size: 20

        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  sql:
    init:
      mode: never

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  ####################################################################
  ## SPRING AI
  ####################################################################

  ai:

    model:
      chat: google-genai
      embedding:
        text: google-genai

    google:

      genai:

        api-key: ${GEMINI_API_KEY}

        chat:

          options:
            model: gemini-2.5-flash
            temperature: 0.1
            max-output-tokens: 4096

        embedding:

          api-key: ${GEMINI_API_KEY}

          options:
            model: text-embedding-004

    vectorstore:

      pgvector:

        initialize-schema: false

        table-name: vector_store

        dimensions: 3072

        distance-type: COSINE_DISTANCE

        index-type: NONE

        remove-existing-vector-store-table: false

security:

  jwt:

    secret-key: ${JWT_SECRET:9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p3q2r1s0t9u8v7w6x5y4z321098765432}

    expiration: 86400000

    issuer: secure-ai-knowledge-hub

app:

  storage:

    upload-dir: ./storage/uploads

logging:

  file:
    name: logs/secure-ai-knowledge-hub.log

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  level:

    root: INFO

    com.sakh: DEBUG

    org.springframework: INFO

    org.springframework.security: INFO

    org.hibernate.SQL: INFO

    org.springframework.ai: DEBUG

    org.springframework.ai.vectorstore: DEBUG